<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>GiftMarket v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080810;color:#f0f0ff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:15px;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
input{font-family:inherit;outline:none;border:none;background:none}
a{text-decoration:none}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(124,92,255,.3)}50%{box-shadow:0 0 44px rgba(124,92,255,.75)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes priceUp{0%{background:transparent}40%{background:rgba(34,212,122,.2)}100%{background:transparent}}
@keyframes priceDown{0%{background:transparent}40%{background:rgba(255,77,106,.2)}100%{background:transparent}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(140px) rotate(720deg);opacity:0}}
@keyframes newItem{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.06) rotate(1deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.app{display:flex;flex-direction:column;min-height:100dvh;max-width:430px;margin:0 auto}
.page{overflow-y:auto;padding-bottom:76px;min-height:100dvh}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(5,5,12,.97);backdrop-filter:blur(28px);border-top:1px solid rgba(255,255,255,.06);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:transform .12s}
.nb:active{transform:scale(.9)}
.npip{position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:2px;border-radius:2px;background:linear-gradient(90deg,#7c5cff,#a480ff);box-shadow:0 0 10px #7c5cff}
.nico{font-size:22px;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.nico.on{transform:scale(1.2) translateY(-1px);filter:drop-shadow(0 0 8px rgba(124,92,255,.8))}
.nlbl{font-size:10px;font-weight:600;letter-spacing:.2px}
.gcard{border-radius:20px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;display:flex;flex-direction:column;background:linear-gradient(160deg,rgba(22,18,40,.98),rgba(12,12,22,.99));border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.gcard:active{transform:scale(.95)}
.shim{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}
.pill{padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;transition:all .18s;white-space:nowrap;cursor:pointer}
.pill.on{background:rgba(124,92,255,.25);border:1px solid rgba(124,92,255,.55);color:#a480ff}
.pill.off{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:#505070}
.spill{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;transition:all .18s;cursor:pointer;white-space:nowrap}
.spill.on{background:rgba(77,159,255,.15);border:1px solid rgba(77,159,255,.35);color:#4d9fff}
.spill.off{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:#404060}
.back{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#f0f0ff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);margin:0 16px}
.tab{flex:1;padding:11px 0;font-size:12px;font-weight:600;background:none;margin-bottom:-1px;cursor:pointer;transition:all .2s}
.drum-wrap{overflow:hidden;border-radius:18px;position:relative;height:200px;background:rgba(255,255,255,.03);border:1px solid rgba(124,92,255,.2)}
.drum-track{display:flex;flex-direction:column}
.drum-item{height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0}
.drum-hl{position:absolute;top:50%;left:0;right:0;height:100px;transform:translateY(-50%);border:2px solid rgba(124,92,255,.6);border-radius:12px;background:rgba(124,92,255,.06);pointer-events:none;z-index:2}
.drum-ft{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(to bottom,rgba(8,8,16,1) 0%,transparent 100%);z-index:3;pointer-events:none}
.drum-fb{position:absolute;bottom:0;left:0;right:0;height:52px;background:linear-gradient(to top,rgba(8,8,16,1) 0%,transparent 100%);z-index:3;pointer-events:none}
.splash{position:fixed;inset:0;z-index:999;background:radial-gradient(ellipse at 40% 30%,#16083a 0%,#080810 65%);display:flex;flex-direction:column;align-items:center;justify-content:center}
.sring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(124,92,255,.2)}
.ld{width:150px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:40px}
.ldf{height:100%;background:linear-gradient(90deg,#7c5cff,#a480ff,#4d9fff);animation:lda 2s ease forwards}
@keyframes lda{from{width:0}to{width:100%}}
.conf{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:999;animation:confetti 1.2s ease-out forwards}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:500;background:linear-gradient(135deg,rgba(124,92,255,.97),rgba(77,159,255,.97));border-radius:14px;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(124,92,255,.5);animation:fadeIn .3s ease;backdrop-filter:blur(10px);white-space:nowrap}
</style>
</head>
<body>
<div class="app">

<div class="splash" id="splash">
  <div style="position:relative;margin-bottom:32px;width:80px;height:80px;display:flex;align-items:center;justify-content:center">
    <div class="sring" style="width:90px;height:90px;animation:pulse 1.5s 0s infinite"></div>
    <div class="sring" style="width:120px;height:120px;animation:pulse 1.5s .3s infinite"></div>
    <div class="sring" style="width:150px;height:150px;animation:pulse 1.5s .6s infinite"></div>
    <div style="width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#7c5cff,#4d9fff);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 50px rgba(124,92,255,.7);position:relative;z-index:1">🎁</div>
  </div>
  <div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#b090ff,#4d9fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.8px;margin-bottom:6px">GiftMarket</div>
  <div style="font-size:12px;color:#5060a0;margin-bottom:40px;letter-spacing:.3px">Telegram Gifts · Live · TON</div>
  <div class="ld"><div class="ldf"></div></div>
  <div id="sstat" style="font-size:11px;color:#4050a0;margin-top:14px">Загрузка цен...</div>
</div>

<div id="main" style="display:none;flex:1;flex-direction:column">
  <div class="page" id="pg-market"></div>
  <div class="page" id="pg-news" style="display:none"></div>
  <div class="page" id="pg-prof" style="display:none"></div>
  <div class="page" id="pg-detail" style="display:none"></div>
  <div class="page" id="pg-roul" style="display:none"></div>

  <nav class="nav">
    <button class="nb" onclick="go('market')">
      <div class="npip" id="pip-market"></div>
      <span class="nico on" id="ico-market">🏪</span>
      <span class="nlbl" style="color:#a480ff" id="lbl-market">Рынок</span>
    </button>
    <button class="nb" onclick="go('news')">
      <div class="npip" id="pip-news" style="display:none"></div>
      <span class="nico" id="ico-news">📰</span>
      <span class="nlbl" style="color:#404060" id="lbl-news">Новости</span>
    </button>
    <button class="nb" onclick="go('roul')">
      <div class="npip" id="pip-roul" style="display:none"></div>
      <span class="nico" id="ico-roul">🎰</span>
      <span class="nlbl" style="color:#404060" id="lbl-roul">Рулетка</span>
    </button>
    <button class="nb" onclick="go('prof')">
      <div class="npip" id="pip-prof" style="display:none"></div>
      <span class="nico" id="ico-prof">👤</span>
      <span class="nlbl" style="color:#404060" id="lbl-prof">Профиль</span>
    </button>
  </nav>
</div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
// CONFIG — прокси сервер
// ═══════════════════════════════════════════
const PROXY = 'https://web-production-ad0c.up.railway.app';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let GIFTS = [];
let prices = {};      // slug -> {floor,change24h,vol24h,listed,supply,sales24h}
let histories = {};   // slug -> [{time,price}]
let tonUsd = 2.05;
let curTab = 'market';
let detailSlug = null;
let roulTarget = null;
let roulStake = null;
let mSort = 'vol24h';
let mQuery = '';
let detailPeriod = 24;
let lotties = {};
let countdown = 20;
let countdownInt = null;

const thumb = s => `https://fragment.com/file/gifts/${s}/thumb.webp`;
const lottieUrl = (s,n) => `https://nft.fragment.com/gift/${s}-${n}.lottie.json`;
const nftImg = (s,n) => `https://nft.fragment.com/gift/${s}-${n}.large.jpg`;

// ═══════════════════════════════════════════
// FETCH реальных данных с прокси
// ═══════════════════════════════════════════
async function fetchPrices() {
  try {
    const r = await fetch(PROXY + '/api/prices', { cache: 'no-store' });
    const j = await r.json();
    tonUsd = j.ton_usd || tonUsd;

    const newSlugs = new Set();
    const oldSlugs = new Set(GIFTS.map(g => g.slug));

    (j.collections || []).forEach(c => {
      newSlugs.add(c.slug);
      const prev = prices[c.slug]?.floor;
      prices[c.slug] = {
        floor: c.floor,
        change24h: c.change24h,
        vol24h: c.vol24h,
        volChange: c.volChange,
        listed: c.listed,
        supply: c.supply,
        sales24h: c.sales24h,
        marketCap: c.marketCap,
        source: c.source,
        prevFloor: prev || c.floor,
        updated: Date.now()
      };

      // История
      if (!histories[c.slug]) histories[c.slug] = [];
      histories[c.slug].push({ time: Date.now(), price: c.floor });
      if (histories[c.slug].length > 8640) histories[c.slug].shift();
    });

    // Обновляем список подарков
    const wasCount = GIFTS.length;
    GIFTS = (j.collections || []).map(c => ({
      slug: c.slug,
      name: c.name,
      photo: c.portalPhoto || thumb(c.slug),
      tg_id: 1,
      isNew: !oldSlugs.has(c.slug) && wasCount > 0
    }));

    // Уведомляем о новых
    GIFTS.filter(g => g.isNew).forEach(g => showToast(`🆕 ${g.name}`, 'Новый подарок появился на рынке!'));

    updatePriceDom();
    countdown = 20;
    return true;
  } catch(e) {
    console.warn('[prices] fetch failed:', e.message);
    return false;
  }
}

async function fetchHistory(slug) {
  try {
    const r = await fetch(`${PROXY}/api/history/${slug}?hours=99999`);
    const j = await r.json();
    if (j.history?.length > 1) {
      const existing = histories[slug] || [];
      const merged = [...j.history, ...existing]
        .sort((a,b) => a.time - b.time)
        .filter((p, i, arr) => i === 0 || p.time !== arr[i-1].time);
      histories[slug] = merged;
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════
// UPDATE DOM (без полного ре-рендера)
// ═══════════════════════════════════════════
function updatePriceDom() {
  GIFTS.forEach(g => {
    const p = prices[g.slug];
    if (!p) return;
    const up = p.change24h >= 0;

    const pEl = document.getElementById('pv-' + g.slug);
    if (pEl) {
      const prev = parseFloat(pEl.dataset.prev || 0);
      pEl.textContent = p.floor.toFixed(2);
      pEl.dataset.prev = p.floor;
      if (prev > 0 && prev !== p.floor) {
        const box = pEl.closest('.price-box');
        if (box) {
          box.style.animation = 'none';
          void box.offsetWidth;
          box.style.animation = p.floor > prev ? 'priceUp .9s ease' : 'priceDown .9s ease';
        }
        pEl.style.color = p.floor > prev ? '#22d47a' : '#ff4d6a';
        setTimeout(() => { if(pEl) pEl.style.color = ''; }, 900);
      }
    }

    const cEl = document.getElementById('pc-' + g.slug);
    if (cEl) {
      cEl.textContent = (up ? '▲' : '▼') + ' ' + Math.abs(p.change24h) + '%';
      cEl.style.color = up ? '#22d47a' : '#ff4d6a';
    }

    const mcEl = document.getElementById('mc-' + g.slug);
    if (mcEl) mcEl.innerHTML = miniChart(g.slug);

    // detail page
    const dpEl = document.getElementById('dp-' + g.slug);
    if (dpEl) dpEl.textContent = p.floor.toFixed(2);
  });

  // Update timer
  const tEl = document.getElementById('update-timer');
  if (tEl) tEl.textContent = '↻ ' + countdown + 'с';
}

// ═══════════════════════════════════════════
// CHARTS (SVG)
// ═══════════════════════════════════════════
function miniChart(slug, w=84, h=28) {
  const pts = (histories[slug] || []).slice(-30).map(p => p.price);
  if (pts.length < 2) {
    return `<div class="shim" style="width:${w}px;height:${h}px;border-radius:6px"></div>`;
  }
  const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 0.01;
  const st = w / (pts.length - 1);
  const up = pts[pts.length-1] >= pts[0];
  const col = up ? '#22d47a' : '#ff4d6a';
  const lp = pts.map((p,i) => `${i?'L':'M'} ${(i*st).toFixed(1)} ${(h-((p-mn)/rng)*h*.86-h*.07).toFixed(1)}`).join(' ');
  const lx = (pts.length-1)*st;
  const gid = 'mc' + slug.replace(/[^a-z0-9]/g,'');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">
<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="${col}" stop-opacity=".28"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
<path d="${lp} L ${lx} ${h} L 0 ${h} Z" fill="url(#${gid})"/>
<path d="${lp}" stroke="${col}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function bigChart(slug, period) {
  const cutoff = period >= 99999 ? 0 : Date.now() - period * 3600000;
  let pts = (histories[slug] || []).filter(p => p.time >= cutoff);
  if (pts.length < 3) pts = (histories[slug] || []).slice(-100);
  if (pts.length < 2) return `<div style="height:140px;display:flex;align-items:center;justify-content:center;color:#303050;font-size:13px">⏳ Загружаем данные с рынка...</div>`;

  const W = 310, H = 130, st = W / (pts.length - 1);
  const pa = pts.map(p => p.price);
  const mn = Math.min(...pa), mx = Math.max(...pa), rng = mx - mn || 0.01;
  const lp = pts.map((p,i) => `${i?'L':'M'} ${(i*st).toFixed(1)} ${(H-((p.price-mn)/rng)*H*.82-H*.09).toFixed(1)}`).join(' ');
  const last = pts[pts.length-1];
  const lx = (pts.length-1)*st;
  const ly = H - ((last.price-mn)/rng)*H*.82 - H*.09;
  const up = last.price >= pts[0].price;
  const col = up ? '#22d47a' : '#ff4d6a';
  const gid = 'bc' + slug.replace(/[^a-z0-9]/g,'');
  const avg = (pa.reduce((a,b)=>a+b,0)/pa.length).toFixed(2);
  const fmt = ts => { const d = new Date(ts); return `${d.getDate()}.${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`; };

  return `<div>
<div style="display:flex;justify-content:space-between;font-size:9px;color:#303055;margin-bottom:5px;padding:0 2px">
  <span>${fmt(pts[0].time)}</span><span>${fmt(last.time)}</span>
</div>
<div style="background:rgba(255,255,255,.02);border-radius:14px;padding:10px 6px 16px;position:relative">
<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="${col}" stop-opacity=".22"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
${[.25,.5,.75].map(r=>`<line x1="0" y1="${H*r}" x2="${W}" y2="${H*r}" stroke="rgba(255,255,255,.032)" stroke-width="1"/>`).join('')}
<path d="${lp} L ${lx} ${H} L 0 ${H} Z" fill="url(#${gid})"/>
<path d="${lp}" stroke="${col}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="${lx}" cy="${ly}" r="5" fill="${col}" opacity=".25"/>
<circle cx="${lx}" cy="${ly}" r="3" fill="${col}"/>
<text x="${lx>250?lx-6:lx+6}" y="${ly-9}" text-anchor="${lx>250?'end':'middle'}" fill="${col}" font-size="10" font-weight="700">${last.price.toFixed(2)}</text>
</svg>
</div>
<div style="display:flex;justify-content:space-around;margin-top:10px">
  <div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Мин</div><div style="font-size:12px;font-weight:800;color:#4d9fff">${mn.toFixed(2)}</div></div>
  <div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Среднее</div><div style="font-size:12px;font-weight:800;color:#a0a0c0">${avg}</div></div>
  <div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Макс</div><div style="font-size:12px;font-weight:800;color:#f0b429">${mx.toFixed(2)}</div></div>
  <div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Точек</div><div style="font-size:12px;font-weight:800;color:#505070">${pts.length}</div></div>
</div>
</div>`;
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(title, body) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div><div style="font-size:11px;font-weight:800;color:#fff">${title}</div><div style="font-size:10px;color:rgba(255,255,255,.7)">${body}</div></div>`;
  document.body.appendChild(t);
  setTimeout(() => t.style.opacity='0', 3500);
  setTimeout(() => t.remove(), 4000);
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function go(tab) {
  ['market','news','prof','detail','roul'].forEach(t => {
    const pg = document.getElementById('pg-'+t); if(pg) pg.style.display='none';
    const pip = document.getElementById('pip-'+t); if(pip) pip.style.display='none';
    const ico = document.getElementById('ico-'+t); if(ico){ ico.className='nico'; }
    const lbl = document.getElementById('lbl-'+t); if(lbl) lbl.style.color='#404060';
  });
  const pg = document.getElementById('pg-'+tab); if(pg) pg.style.display='block';
  const pip = document.getElementById('pip-'+tab); if(pip) pip.style.display='block';
  const ico = document.getElementById('ico-'+tab); if(ico) ico.className='nico on';
  const lbl = document.getElementById('lbl-'+tab); if(lbl) lbl.style.color='#a480ff';
  curTab = tab;
  if(tab==='market') renderMarket();
  if(tab==='news') renderNews();
  if(tab==='prof') renderProfile();
  if(tab==='roul') renderRoulette();
}

function openDetail(slug) {
  detailSlug = slug;
  ['pg-market','pg-news','pg-prof','pg-roul'].forEach(x => { const e=document.getElementById(x); if(e)e.style.display='none'; });
  document.getElementById('pg-detail').style.display='block';
  renderDetail(slug);
  fetchHistory(slug);
}
function closeDetail() {
  document.getElementById('pg-detail').style.display='none';
  go(['market','news','prof'].includes(curTab) ? curTab : 'market');
}

// ═══════════════════════════════════════════
// LOTTIE
// ═══════════════════════════════════════════
function loadLottie(cid, url) {
  const el = document.getElementById(cid);
  if (!el || typeof lottie === 'undefined') return;
  if (lotties[cid]) { try { lotties[cid].destroy(); } catch(e){} delete lotties[cid]; }
  try {
    lotties[cid] = lottie.loadAnimation({ container:el, renderer:'svg', loop:true, autoplay:true, path:url });
    lotties[cid].addEventListener('data_failed', () => {

function renderGrid() {
  const gr = document.getElementById('mgrid');
  if (!gr) return;

  let list = [...GIFTS];
  if (mQuery) list = list.filter(g => g.name.toLowerCase().includes(mQuery.toLowerCase()));
  list.sort((a,b) => {
    const pa = prices[a.slug] || {}, pb = prices[b.slug] || {};
    if (mSort === 'vol24h') return (pb.vol24h||0) - (pa.vol24h||0);
    if (mSort === 'floor_desc') return (pb.floor||0) - (pa.floor||0);
    if (mSort === 'floor_asc') return (pa.floor||0) - (pb.floor||0);
    if (mSort === 'change_up') return (pb.change24h||0) - (pa.change24h||0);
    if (mSort === 'change_down') return (pa.change24h||0) - (pb.change24h||0);
    return 0;
  });

  if (list.length === 0) {
    gr.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#404060">
      <div style="font-size:36px;margin-bottom:10px">🔍</div>
      <div style="font-size:14px;font-weight:600">Ничего не найдено</div>
    </div>`;
    return;
  }

  gr.innerHTML = list.map((g, i) => {
    const p = prices[g.slug] || { floor:0, change24h:0, vol24h:0 };
    const up = p.change24h >= 0;
    const usd = (p.floor * tonUsd).toFixed(0);

    return `<div class="gcard" onclick="openDetail('${g.slug}')"
      style="animation:fadeUp .2s ease ${i*.025}s both${g.isNew?',newItem .5s ease':''};${g.isNew?'border-color:rgba(124,92,255,.4)':''}">

function dtab(t) {
  ['info','chart','nfts'].forEach(x => {
    const b = document.getElementById('dt-'+x);
    if(b){ b.style.borderBottom = t===x ? '2px solid #7c5cff' : '2px solid transparent'; b.style.color = t===x ? '#a480ff' : '#505070'; }
  });
  const g = GIFTS.find(x => x.slug === detailSlug);
  const p = prices[detailSlug] || {};
  const el = document.getElementById('dtcontent');
  if (!el || !g) return;
  if (t === 'info') el.innerHTML = renderDtInfo(g, p);
  else if (t === 'chart') { el.innerHTML = renderDtChart(g); }
  else if (t === 'nfts') { el.innerHTML = renderDtNfts(g); setTimeout(() => initNftLotties(g), 150); }
}

function spinDrum(drum, won) {
  const track = document.getElementById('drum-track');
  if (!track) return;
  const itemH = 100;
  const maxPos = (drum.length - 2) * itemH;
  let pos = 0, speed = 15, decelling = false, done = false;

  const step = () => {
    if (done) return;
    pos += speed;
    if (!decelling && pos >= maxPos - 5 * itemH) decelling = true;
    if (decelling) speed = Math.max(0.8, speed * 0.87);
    if (pos >= maxPos) {
      pos = maxPos;
      done = true;
      track.style.transform = `translateY(-${pos}px)`;
      // Подсвечиваем результат
      const hl = document.querySelector('.drum-hl');
      if (hl) { hl.style.borderColor = won ? '#22d47a' : '#ff4d6a'; hl.style.boxShadow = `0 0 20px ${won ? 'rgba(34,212,122,.4)' : 'rgba(255,77,106,.4)'} inset`; }
      setTimeout(() => showRouletteResult(won), 700);
      return;
    }
    track.style.transform = `translateY(-${pos}px)`;
    requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

async function init() {
  const st = document.getElementById('sstat');

  try {
    if(st) st.textContent = 'Подключаемся к Portal Market...';
    const ok = await fetchPrices();

    if (!ok || GIFTS.length === 0) {
      if(st) st.textContent = '⚠️ Нет данных — проверяем...';
      // Пробуем ещё раз через 3 секунды
      setTimeout(async () => {
        const ok2 = await fetchPrices();
        if (!ok2) {
          if(st) st.textContent = '❌ Прокси: ' + PROXY;
        }
        document.getElementById('splash').style.display='none';
        document.getElementById('main').style.display='flex';
        go('market');
      }, 3000);
      return;
    }

    if(st) st.textContent = `✅ Загружено ${GIFTS.length} подарков`;
    setTimeout(() => {
      document.getElementById('splash').style.display='none';
      document.getElementById('main').style.display='flex';
      go('market');
    }, 500);

    // Обновление каждые 20 секунд
    setInterval(fetchPrices, 20000);

    // Countdown timer
    countdownInt = setInterval(() => {
      countdown = Math.max(0, countdown - 1);
      const tEl = document.getElementById('update-timer');
      if (tEl) tEl.textContent = `↻ ${countdown}с`;
      if (countdown === 0) countdown = 20;
    }, 1000);

  } catch(e) {
    console.error('Init error:', e);
    if(st) st.textContent = 'Ошибка: ' + e.message;
    setTimeout(() => {
      document.getElementById('splash').style.display='none';
      document.getElementById('main').style.display='flex';
      go('market');
    }, 2000);
  }
}

init();
