<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080810"/>
<meta name="theme-color" content="#080810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CursorGift v3.1</title><!-- BUILD:2026-05-20-v3 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script>
/* === PROFILE UI — CursorGift === */
(function (global) {
  'use strict';

  const API_BASE     = 'https://web-production-ad0c.up.railway.app/api';
  const MANIFEST_URL = 'https://stepik-tech.github.io/market/tonconnect-manifest.json';
  const TONAPI_BASE  = 'https://tonapi.io/v2';
  const COLORS = ['#7c5cff','#ff6eb4','#4d9fff','#22d47a','#f0b429','#ff4d6a'];

  let _profile      = null;
  let _tonConnectUI = null;
  let _wallet       = null;
  let _nfts         = [];
  let _balanceTon   = null;

  // ── Telegram helpers ────────────────────────────────────────────────────────
  function getTgUser() {
    try { return window.Telegram?.WebApp?.initDataUnsafe?.user || null; } catch(_){ return null; }
  }
  function getInitData() {
    try { return window.Telegram?.WebApp?.initData || ''; } catch(_){ return ''; }
  }

  // ── Avatar ──────────────────────────────────────────────────────────────────
  function getAvatarColor(userId) {
    return COLORS[Math.abs(Number(userId)) % COLORS.length];
  }

  function getInitials(user) {
    const fn = (user.first_name || '').trim();
    const ln = (user.last_name  || '').trim();
    if (fn && ln) return (fn[0] + ln[0]).toUpperCase();
    if (fn) return fn.slice(0,2).toUpperCase();
    if (user.username) return user.username.slice(0,2).toUpperCase();
    return '??';
  }

  function buildAvatar(user, size) {
    size = size || 76;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:' + size + 'px;height:' + size + 'px;flex-shrink:0;';

    const dot = document.createElement('div');
    dot.style.cssText = 'position:absolute;bottom:2px;right:2px;width:14px;height:14px;background:#22d47a;border:2px solid #080810;border-radius:50%;z-index:2;box-shadow:0 0 6px #22d47a;';

    const circle = document.createElement('div');
    circle.style.cssText = [
      'width:' + size + 'px;height:' + size + 'px;border-radius:50%;overflow:hidden;',
      'background:' + getAvatarColor(user.id || user.tg_id || 0) + ';',
      'display:flex;align-items:center;justify-content:center;',
      'font-size:' + Math.round(size * 0.32) + 'px;font-weight:700;color:#fff;',
      'letter-spacing:1px;user-select:none;border:2px solid rgba(124,92,255,.5);'
    ].join('');

    const photoUrl = user.photo_url;
    if (photoUrl) {
      const img = document.createElement('img');
      img.src = photoUrl;
      img.alt = 'avatar';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
      img.onerror = function() { img.remove(); circle.textContent = getInitials(user); };
      circle.appendChild(img);
    } else {
      circle.textContent = getInitials(user);
    }

    wrap.appendChild(circle);
    wrap.appendChild(dot);
    return wrap;
  }

  // ── TON Connect ─────────────────────────────────────────────────────────────
  function initTonConnect() {
    if (_tonConnectUI) return _tonConnectUI;
    if (!window.TON_CONNECT_UI) {
      console.warn('[Profile] TON_CONNECT_UI not loaded');
      return null;
    }
    try {
      _tonConnectUI = new window.TON_CONNECT_UI.TonConnectUI({ manifestUrl: MANIFEST_URL });
      _tonConnectUI.onStatusChange(function(wallet) {
        _wallet = wallet;
        if (wallet) {
          var addr = wallet.account && wallet.account.address;
          if (addr) {
            _balanceTon = null;
            fetchBalance(addr);
            fetchNFTs(addr);
            saveWalletToServer(addr);
          }
        } else {
          _wallet = null;
          _balanceTon = null;
          _nfts = [];
        }
        if (document.getElementById('cg-profile-root')) renderProfile();
        if (document.getElementById('cg-settings-root')) pSettings();
      });
      return _tonConnectUI;
    } catch(e) {
      console.error('[initTonConnect]', e);
      return null;
    }
  }

  // ── API ─────────────────────────────────────────────────────────────────────
  async function fetchProfile() {
    var initData = getInitData();
    var tgUser   = getTgUser();

    if (!tgUser && !initData) {
      _profile = { tg_id:0, first_name:'Demo', last_name:'User', username:'demo', photo_url:null, is_premium:0, wallet:null };
      return _profile;
    }

    try {
      var res  = await fetch(API_BASE + '/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: initData })
      });
      var data = await res.json();
      if (data.ok && data.profile) { _profile = data.profile; return _profile; }
    } catch(e) {
      console.warn('[fetchProfile] fallback to local', e.message);
    }

    if (tgUser) {
      _profile = {
        tg_id:      tgUser.id,
        first_name: tgUser.first_name  || '',
        last_name:  tgUser.last_name   || '',
        username:   tgUser.username    || '',
        photo_url:  tgUser.photo_url   || null,
        is_premium: tgUser.is_premium  ? 1 : 0,
        wallet:     null
      };
    }
    return _profile;
  }

  async function fetchBalance(address) {
    try {
      var res  = await fetch(TONAPI_BASE + '/accounts/' + encodeURIComponent(address), { headers: { 'Accept': 'application/json' } });
      var data = await res.json();
      _balanceTon = (Number(data.balance) / 1e9).toFixed(2);
    } catch(_) { _balanceTon = '—'; }
    var el = document.getElementById('cg-balance-ton');
    if (el) el.textContent = (_balanceTon || '—') + ' TON';
  }

  async function fetchNFTs(address) {
    try {
      var res = await fetch(API_BASE + '/nfts/' + encodeURIComponent(address));
      if (res.ok) {
        var data = await res.json();
        _nfts = data.nfts || [];
        renderNFTGrid();
        return;
      }
    } catch(_) {}
    try {
      var res2  = await fetch(TONAPI_BASE + '/accounts/' + encodeURIComponent(address) + '/nfts?limit=50&indirect_ownership=true', { headers: { 'Accept': 'application/json' } });
      var data2 = await res2.json();
      _nfts = data2.nft_items || [];
    } catch(_) { _nfts = []; }
    renderNFTGrid();
  }

  async function saveWalletToServer(address) {
    var initData = getInitData();
    if (!initData) return;
    try {
      await fetch(API_BASE + '/wallet/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: initData, address: address })
      });
    } catch(_) {}
  }

  // ── Format helpers ──────────────────────────────────────────────────────────
  function shortAddr(addr) {
    if (!addr) return '';
    return addr.slice(0,6) + '...' + addr.slice(-4);
  }

  function nftImageUrl(nft) {
    var meta = nft.metadata || {};
    return meta.image || (nft.previews && nft.previews[0] && nft.previews[0].url) || '';
  }

  function nftName(nft) {
    return (nft.metadata && nft.metadata.name) || nft.dns || ('NFT #' + (nft.index != null ? nft.index : '?'));
  }

  // ── Wallet button ───────────────────────────────────────────────────────────
  function buildWalletButton(container) {
    var tc = initTonConnect();
    var walletAddr = _wallet && _wallet.account && _wallet.account.address;

    if (!tc) {
      var btn = document.createElement('button');
      btn.textContent = '🔗 Подключить TON кошелёк';
      btn.style.cssText = 'width:100%;padding:13px;background:linear-gradient(135deg,#7c5cff,#4d9fff);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;';
      btn.onclick = function() { alert('TON Connect SDK не загружен'); };
      container.appendChild(btn);
      return;
    }

    if (walletAddr) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;background:rgba(124,92,255,.1);border:1px solid rgba(124,92,255,.3);border-radius:12px;padding:12px 14px;margin-top:8px;';
      row.innerHTML = '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span style="font-size:18px;">💎</span>' +
        '<div><div style="font-size:12px;color:#808090;">TON кошелёк</div>' +
        '<div style="font-size:14px;font-weight:600;color:#f0f0ff;">' + shortAddr(walletAddr) + '</div></div>' +
        '</div>' +
        '<button id="cg-disconnect-btn" style="background:rgba(255,77,106,.15);border:1px solid rgba(255,77,106,.3);border-radius:8px;color:#ff4d6a;padding:6px 10px;font-size:12px;cursor:pointer;">Отключить</button>';
      row.querySelector('#cg-disconnect-btn').onclick = function() { tc.disconnect(); };
      container.appendChild(row);
    } else {
      var btn2 = document.createElement('button');
      btn2.textContent = '🔗 Подключить TON кошелёк';
      btn2.style.cssText = 'width:100%;padding:13px;background:linear-gradient(135deg,#7c5cff,#4d9fff);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s;';
      btn2.onmouseenter = function() { btn2.style.opacity = '.85'; };
      btn2.onmouseleave = function() { btn2.style.opacity = '1'; };
      btn2.onclick = function() { tc.openModal(); };
      container.appendChild(btn2);
    }
  }

  // ── NFT Grid ────────────────────────────────────────────────────────────────
  function renderNFTGrid() {
    var grid = document.getElementById('cg-nft-grid');
    if (!grid) return;
    grid.innerHTML = '';

    if (!_nfts.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px;color:#505070;">' +
        '<div style="font-size:36px;margin-bottom:8px;">🎁</div>' +
        '<div style="font-size:13px;font-weight:600;color:#a0a0c0;">NFT подарков пока нет</div>' +
        '<div style="font-size:11px;color:#505070;margin-top:4px;">Подключите TON кошелёк</div></div>';
      return;
    }

    _nfts.slice(0,20).forEach(function(nft) {
      var card = document.createElement('div');
      card.style.cssText = 'background:rgba(22,18,40,.98);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;';
      card.onmouseenter = function() { card.style.transform='translateY(-3px)'; card.style.borderColor='rgba(124,92,255,.4)'; };
      card.onmouseleave = function() { card.style.transform='none'; card.style.borderColor='rgba(255,255,255,.07)'; };

      var imgUrl = nftImageUrl(nft);
      var name   = nftName(nft);
      var floor  = nft.sale && nft.sale.price && nft.sale.price.value
        ? (Number(nft.sale.price.value) / 1e9).toFixed(2) + ' TON' : '';

      card.innerHTML =
        '<div style="width:100%;padding-bottom:100%;position:relative;background:rgba(0,0,0,.2);">' +
          (imgUrl
            ? '<img src="' + imgUrl + '" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" onerror="this.style.display=\'none\'">'
            : '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;">🎁</div>') +
        '</div>' +
        '<div style="padding:8px 10px 10px;">' +
          '<div style="font-size:11px;font-weight:700;color:#e0e0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + name + '</div>' +
          (floor ? '<div style="font-size:10px;color:#f0b429;margin-top:3px;">💎 ' + floor + '</div>' : '') +
        '</div>';

      card.onclick = function() {
        if (nft.address) window.open('https://getgems.io/nft/' + nft.address, '_blank');
      };
      grid.appendChild(card);
    });
  }

  // ── Stats cards ─────────────────────────────────────────────────────────────
  function buildStatsCards() {
    var walletAddr = _wallet && _wallet.account && _wallet.account.address;
    var cards = [
      { icon:'💼', label:'Портфель TON', value: walletAddr ? (_balanceTon ? _balanceTon + ' TON' : '...') : 'не подключён', color:'#4d9fff' },
      { icon:'🎁', label:'NFT подарков', value: walletAddr ? String(_nfts.length) : '—', color:'#7c5cff' },
      { icon:'📊', label:'На рынке',     value:'—', color:'#f0b429' }
    ];

    var row = document.createElement('div');
    row.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;';

    cards.forEach(function(card) {
      var el = document.createElement('div');
      el.style.cssText = 'background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px 8px;text-align:center;';
      el.innerHTML =
        '<div style="font-size:18px;margin-bottom:4px;">' + card.icon + '</div>' +
        '<div style="font-size:12px;font-weight:900;color:' + card.color + ';">' + card.value + '</div>' +
        '<div style="font-size:9px;color:#505070;margin-top:2px;">' + card.label + '</div>';
      row.appendChild(el);
    });
    return row;
  }

  // ── renderProfile ───────────────────────────────────────────────────────────
  async function renderProfile() {
    var pgEl = document.getElementById('pg-prof');
    if (!pgEl) return;

    pgEl.innerHTML = '<div id="cg-profile-root" style="animation:fadeIn .25s ease;"></div>';
    var root = document.getElementById('cg-profile-root');

    root.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#505070;">' +
      '<div style="font-size:32px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>' +
      '<div style="font-size:13px;">Загрузка профиля...</div></div>';

    var user = await fetchProfile();

    if (!user) {
      root.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#505070;">😕 Не удалось загрузить профиль</div>';
      return;
    }

    root.innerHTML = '';

    // ── Hero ────────────────────────────────────────────────────────────────
    var hero = document.createElement('div');
    hero.style.cssText = 'background:linear-gradient(145deg,#150830,#0a0518,#080810);padding:0;border-bottom:1px solid rgba(124,92,255,.15);position:relative;overflow:hidden;';

    var heroBg = document.createElement('div');
    heroBg.style.cssText = 'position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(124,92,255,.22) 0%,transparent 70%);border-radius:50%;';
    hero.appendChild(heroBg);

    var heroInner = document.createElement('div');
    heroInner.style.cssText = 'padding:24px 16px 20px;position:relative;';

    // Online badge top right
    var onlineBadge = document.createElement('div');
    onlineBadge.style.cssText = 'position:absolute;top:16px;right:16px;display:inline-flex;align-items:center;gap:5px;background:rgba(34,212,122,.1);border:1px solid rgba(34,212,122,.25);border-radius:20px;padding:4px 10px;';
    onlineBadge.innerHTML = '<div style="width:6px;height:6px;border-radius:50%;background:#22d47a;animation:onlinePulse 2s infinite;"></div><span style="font-size:10px;color:#22d47a;font-weight:700;" class="online-count">0</span><span style="font-size:10px;color:#22d47a;font-weight:700;"> онлайн</span>';
    heroInner.appendChild(onlineBadge);

    // Avatar + name
    var userRow = document.createElement('div');
    userRow.style.cssText = 'display:flex;align-items:center;gap:16px;margin-bottom:20px;';
    userRow.appendChild(buildAvatar(user, 76));

    var nameBlock = document.createElement('div');
    nameBlock.style.cssText = 'flex:1;min-width:0;';
    var fullName  = [user.first_name, user.last_name].filter(Boolean).join(' ') || 'Пользователь';
    var isPremium = user.is_premium == 1 || user.is_premium === true;

    nameBlock.innerHTML =
      '<div style="font-size:22px;font-weight:900;color:#f0f0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + fullName + '</div>' +
      (user.username ? '<div style="font-size:13px;color:#7c5cff;margin-top:2px;font-weight:600;">@' + user.username + '</div>' : '') +
      '<div style="font-size:10px;color:#404060;margin-top:2px;font-family:monospace;">ID ' + (user.tg_id || user.id || '—') + '</div>' +
      '<div style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 10px;border-radius:8px;' +
        (isPremium ? 'background:rgba(240,180,41,.15);border:1px solid rgba(240,180,41,.3);' : 'background:rgba(124,92,255,.12);border:1px solid rgba(124,92,255,.25);') + '">' +
        '<span style="font-size:13px;">' + (isPremium ? '⭐' : '🎁') + '</span>' +
        '<span style="font-size:10px;font-weight:700;color:' + (isPremium ? '#f0b429' : '#a480ff') + ';">' + (isPremium ? 'Telegram Premium' : 'CursorGift') + '</span>' +
      '</div>';

    userRow.appendChild(nameBlock);
    heroInner.appendChild(userRow);

    // Stats
    heroInner.appendChild(buildStatsCards());
    hero.appendChild(heroInner);
    root.appendChild(hero);

    // ── Online users ────────────────────────────────────────────────────────
    var onlineSection = document.createElement('div');
    onlineSection.style.cssText = 'padding:14px 16px 0;';
    onlineSection.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
        '<div style="font-size:10px;font-weight:700;color:#505070;letter-spacing:.5px;">👥 СЕЙЧАС В ПРИЛОЖЕНИИ</div>' +
        '<div style="font-size:10px;color:#22d47a;font-weight:700;" class="online-count">0</div>' +
      '</div>' +
      '<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;" id="cg-online-users">' +
        '<div style="color:#404060;font-size:12px;padding:8px 0;">Загрузка...</div>' +
      '</div>';
    root.appendChild(onlineSection);

    // ── Tabs ────────────────────────────────────────────────────────────────
    var tabs = document.createElement('div');
    tabs.style.cssText = 'display:flex;border-bottom:1px solid rgba(255,255,255,.07);margin-top:14px;position:sticky;top:0;background:#080810;z-index:5;';

    var tabDefs = [['inv','🎁 Подарки'],['wallet','💎 Кошелёк'],['settings','⚙️ Инфо']];
    tabDefs.forEach(function(td, i) {
      var btn = document.createElement('button');
      btn.style.cssText = 'flex:1;padding:11px 4px;font-size:11px;font-weight:600;background:none;border:none;border-bottom:' + (i===0?'2px solid #7c5cff':'2px solid transparent') + ';color:' + (i===0?'#a480ff':'#505070') + ';cursor:pointer;margin-bottom:-1px;transition:all .2s;';
      btn.textContent = td[1];
      btn.dataset.tab = td[0];
      btn.onclick = function() {
        tabs.querySelectorAll('button').forEach(function(b) { b.style.borderBottom='2px solid transparent'; b.style.color='#505070'; });
        btn.style.borderBottom = '2px solid #7c5cff';
        btn.style.color = '#a480ff';
        renderTabContent(td[0], tabContent, user);
      };
      tabs.appendChild(btn);
    });
    root.appendChild(tabs);

    var tabContent = document.createElement('div');
    tabContent.style.cssText = 'padding:14px;';
    root.appendChild(tabContent);

    renderTabContent('inv', tabContent, user);
  }

  function renderTabContent(tab, container, user) {
    container.innerHTML = '';

    if (tab === 'inv') {
      // Инвентарь — топ подарки рынка как "рекомендации"
      container.innerHTML =
        '<div style="font-size:10px;font-weight:700;color:#505070;margin-bottom:10px;letter-spacing:.5px;">🎁 МОИ NFT ПОДАРКИ</div>' +
        '<div id="cg-nft-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;"></div>';
      renderNFTGrid();

      if (!(_wallet && _wallet.account && _wallet.account.address)) {
        var hint = document.createElement('div');
        hint.style.cssText = 'background:rgba(124,92,255,.07);border:1px solid rgba(124,92,255,.18);border-radius:13px;padding:14px;margin-top:12px;text-align:center;';
        hint.innerHTML = '<div style="font-size:13px;color:#a480ff;font-weight:600;margin-bottom:6px;">💎 Подключи TON кошелёк</div><div style="font-size:11px;color:#7070a0;">Чтобы увидеть свои NFT подарки из блокчейна</div>';
        container.appendChild(hint);
      }
    }

    else if (tab === 'wallet') {
      var walletWrap = document.createElement('div');
      walletWrap.innerHTML = '<div style="font-size:10px;font-weight:700;color:#505070;margin-bottom:10px;letter-spacing:.5px;">💎 TON КОШЕЛЁК</div>';
      buildWalletButton(walletWrap);

      var walletAddr = _wallet && _wallet.account && _wallet.account.address;
      if (walletAddr) {
        walletWrap.innerHTML +=
          '<div style="margin-top:14px;background:rgba(255,255,255,.03);border-radius:13px;padding:13px;border:1px solid rgba(255,255,255,.06);">' +
          '<div style="font-size:10px;color:#505070;font-weight:600;margin-bottom:8px;">БАЛАНС</div>' +
          '<div style="font-size:24px;font-weight:900;color:#f0b429;" id="cg-balance-ton">' + (_balanceTon ? _balanceTon + ' TON' : '...') + '</div>' +
          '</div>';
      }
      container.appendChild(walletWrap);
    }

    else if (tab === 'settings') {
      var u = user || _profile || {};
      container.innerHTML =
        '<div style="background:rgba(255,255,255,.03);border-radius:16px;padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06);">' +
          '<div style="font-size:10px;color:#505070;font-weight:700;margin-bottom:10px;letter-spacing:.5px;">АККАУНТ TELEGRAM</div>' +
          makeRow('🆔','Telegram ID', String(u.tg_id || u.id || '—')) +
          makeRow('👤','Username', u.username ? '@' + u.username : 'не задан') +
          makeRow('⭐','Premium', (u.is_premium == 1 || u.is_premium === true) ? 'Активен' : 'Нет') +
        '</div>' +
        '<div style="background:rgba(255,255,255,.03);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.06);">' +

function esc(v){
  return String(v ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}
function shortAddr(a){
  a=String(a||'');
  return a.length>14 ? a.slice(0,6)+'…'+a.slice(-6) : (a||'—');
}
function fmtTon(v, d=3){
  const n = Number(v||0);
  return n > 0 ? n.toFixed(d).replace(/\.?(0+)$/,'') : '0';
}
function profileGiftList(){ return walletGifts || []; }
function isTelegramGiftNft(n){
  const meta=n?.metadata||{};
  const col=n?.collection||{};
  const blob=[meta.name,meta.description,meta.image,meta.content_url,meta.external_url,col.name,col.description,n?.address].filter(Boolean).join(' ').toLowerCase();
  return (blob.includes('telegram') && blob.includes('gift')) || blob.includes('fragment.com/gift') || blob.includes('nft.fragment.com');
}
function normalizeWalletGift(n){
  const meta=n?.metadata||{};
  const img = meta.image || meta.preview || meta.content_url || n?.previews?.[2]?.url || n?.previews?.[1]?.url || n?.previews?.[0]?.url || '';

    type:'wallet',
    address: addr,
    name: meta.name || n?.dns || 'Telegram Gift',
    image: img,
    collection: n?.collection?.name || 'Telegram NFT',
    description: meta.description || '',
    url: meta.external_url || (addr ? 'https://getgems.io/nft/'+addr : '#'),
    floor: 0
  };
}
async function initTonConnect(){

function handleTonWallet(wallet){

async function refreshWalletData(){ await loadWalletData(true); }
async function loadWalletData(force=false){
  if (!walletAddress || walletLoading) return;
  if (!force && Date.now()-walletLastUpdate < 45000) return;
  walletLoading = true;
  if (curTab==='prof') renderProfile();
  try {
    const [acc,nfts] = await Promise.allSettled([
      fetch('https://tonapi.io/v2/accounts/'+encodeURIComponent(walletAddress), {cache:'no-store'}).then(r=>r.ok?r.json():null),
      fetch('https://tonapi.io/v2/accounts/'+encodeURIComponent(walletAddress)+'/nfts?limit=1000&offset=0', {cache:'no-store'}).then(r=>r.ok?r.json():null)
    ]);
    const account = acc.status==='fulfilled' ? acc.value : null;
    walletBalance = Number(account?.balance || 0) / 1e9;
    if (!Number.isFinite(walletBalance) || walletBalance < 0) walletBalance = 0;
    const items = (nfts.status==='fulfilled' ? (nfts.value?.nft_items || nfts.value?.items || []) : []);
    walletGifts = items.filter(isTelegramGiftNft).map(normalizeWalletGift);
    walletLastUpdate = Date.now();
    saveProfile();
  } catch(e) {
    console.warn('[wallet]', e.message);
    walletBalance = 0;
    walletGifts = [];
  }
  walletLoading = false;
  if (curTab==='prof') renderProfile();
  if (curTab==='market') renderMarket();
}

      <button onclick="refreshWalletData()" style="background:rgba(77,159,255,.10);border:1px solid rgba(77,159,255,.22);border-radius:11px;padding:8px;text-align:center;color:#4d9fff;font-size:10px;font-weight:800">${walletLoading?'⏳':'↻'} Обновить</button>

// ═══ NFT ATTRS ═══
async function loadNftAttrs(slug) {
  if (nftAttrsData[slug] || nftAttrsData[slug+'_l']) return;
  nftAttrsData[slug+'_l'] = true;
  try {
    const r = await fetch(PROXY_HTTP+'/api/attrs/'+slug);

    nftAttrsData[slug] = j;
    const el = document.getElementById('attrs-block-'+slug);
    if (el) el.innerHTML = renderAttrsBlock(j);
  } catch(e){}
  delete nftAttrsData[slug+'_l'];
}

function renderAttrsBlock(a) {
  if (!a||!a.models?.length) return '<div style="text-align:center;padding:14px;color:#404060;font-size:12px">Данные загружаются...</div>';
  const rc=p=>p<=5?'#f0b429':p<=15?'#c77dff':p<=30?'#4d9fff':'#78c87a';
  const rl=p=>p<=5?'Редкий':p<=15?'Необычный':p<=30?'Частый':'Обычный';
  const sec=(t,items)=>{
    if(!items?.length)return'';
    return '<div style="margin-bottom:13px"><div style="font-size:10px;font-weight:700;color:#505070;margin-bottom:7px;letter-spacing:.5px">'+t+'</div><div style="display:flex;flex-direction:column;gap:4px">'+

    '<div style="font-size:12px;font-weight:800;color:'+rc(it.rarity)+';min-width:38px;text-align:right">'+it.rarity.toFixed(1)+'%</div></div>').join('')+

    '</div></div>';
  };
  return '<div style="animation:fadeIn .3s ease">'+sec('🎭 МОДЕЛИ',a.models)+sec('🖼️ ФОНЫ',a.backdrops)+sec('✨ СИМВОЛЫ',a.symbols)+'<div style="text-align:center;font-size:9px;color:#303050;margin-top:6px">Сканировано '+(a.scanned||0)+' NFT · Fragment CDN</div></div>';
}

// ═══ FETCH PRICES ═══
async function fetchPrices() {
  try {
    const r = await fetch(PROXY_HTTP+'/api/prices',{cache:'no-store'});
    const j = await r.json();
    tonUsd = j.ton_usd || tonUsd;
    const oldSlugs = new Set(GIFTS.map(g=>g.slug)), wasCount = GIFTS.length;
    (j.collections||[]).forEach(c=>{
      const prev = prices[c.slug]?.floor;
      prices[c.slug] = {floor:c.floor,change24h:c.change24h,vol24h:c.vol24h,listed:c.listed,supply:c.supply,sales24h:c.sales24h,marketCap:c.marketCap,prevFloor:prev||c.floor,updated:Date.now()};
      if (!histories[c.slug]) histories[c.slug]=[];
      histories[c.slug].push({time:Date.now(),price:c.floor});
      if (histories[c.slug].length>8640) histories[c.slug].shift();
    });
    GIFTS = (j.collections||[]).map(c=>({slug:c.slug,name:c.name,photo:c.portalPhoto||thumb(c.slug),tg_id:1,isNew:!oldSlugs.has(c.slug)&&wasCount>0}));
    GIFTS.filter(g=>g.isNew).forEach(g=>showToast('🆕 '+g.name,'Новый подарок!'));
    updatePriceDom(); countdown=20; return true;
  } catch(e){ return false; }
}

async function fetchHistory(slug) {
  try {
    // Загружаем полную историю с реальными продажами
    const r = await fetch(`${PROXY_HTTP}/api/history/${slug}?hours=99999`);
    const j = await r.json();
    if (j.history?.length > 1) {
      const sales = j.history;
      const current = histories[slug]||[];
      // Мержим реальные продажи с текущей историей (накопленной за сессию)
      const merged = [...sales, ...current]
        .sort((a,b)=>a.time-b.time)
        .filter((p,i,arr)=>i===0||p.time!==arr[i-1].time);
      histories[slug] = merged;
      console.log(`[${slug}] history: ${merged.length} points, from ${new Date(merged[0].time).toLocaleDateString('ru')}`);
    }
  } catch(e){ console.warn('[history]', slug, e.message); }
}

function updatePriceDom() {
  GIFTS.forEach(g=>{
    const p=prices[g.slug]; if(!p)return;

    if(pEl){
      const prev=parseFloat(pEl.dataset.prev||0); pEl.textContent=p.floor.toFixed(2); pEl.dataset.prev=p.floor;
      if(prev>0&&prev!==p.floor){const box=pEl.closest('.price-box');if(box){box.style.animation='none';void box.offsetWidth;box.style.animation=p.floor>prev?'priceUp .9s ease':'priceDown .9s ease';}pEl.style.color=p.floor>prev?'#22d47a':'#ff4d6a';setTimeout(()=>{if(pEl)pEl.style.color='';},900);}
    }

// ═══ CHARTS ═══
function miniChart(slug,w=84,h=28) {
  const pts=(histories[slug]||[]).slice(-30).map(p=>p.price);
  if(pts.length<2)return `<div class="shim" style="width:${w}px;height:${h}px;border-radius:6px"></div>`;
  const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||0.01,st=w/(pts.length-1);
  const up=pts[pts.length-1]>=pts[0],col=up?'#22d47a':'#ff4d6a';
  const lp=pts.map((p,i)=>`${i?'L':'M'} ${(i*st).toFixed(1)} ${(h-((p-mn)/rng)*h*.86-h*.07).toFixed(1)}`).join(' ');
  const lx=(pts.length-1)*st,gid='mc'+slug.replace(/[^a-z0-9]/g,'');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".28"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${lp} L ${lx} ${h} L 0 ${h} Z" fill="url(#${gid})"/><path d="${lp}" stroke="${col}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function bigChart(slug,period) {
  const allPts = histories[slug]||[];
  let pts;
  if (period >= 99999) {
    // ВСЁ — показываем от самой первой продажи
    pts = allPts;
  } else {
    const cutoff = Date.now() - period*3600000;
    pts = allPts.filter(p=>p.time>=cutoff);
    // Если мало точек для выбранного периода — показываем что есть
    if (pts.length < 3 && allPts.length > 0) pts = allPts.slice(-Math.min(allPts.length, 50));
  }
  if(pts.length<2)return `<div style="height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#303050;gap:8px"><div style="font-size:26px">⏳</div><div style="font-size:13px">Накапливаем данные...</div><div style="font-size:10px">Каждые 20 сек</div></div>`;
  const W=320,H=150,st=W/(pts.length-1);
  const pa=pts.map(p=>p.price),mn=Math.min(...pa),mx=Math.max(...pa),rng=mx-mn||0.01;
  const lp=pts.map((p,i)=>`${i?'L':'M'} ${(i*st).toFixed(1)} ${(H-((p.price-mn)/rng)*H*.78-H*.11).toFixed(1)}`).join(' ');
  const last=pts[pts.length-1],lx=(pts.length-1)*st,ly=H-((last.price-mn)/rng)*H*.78-H*.11;
  const up=last.price>=pts[0].price,col=up?'#22d47a':'#ff4d6a';
  const gid='bc'+slug.replace(/[^a-z0-9]/g,''),avg=pa.reduce((a,b)=>a+b,0)/pa.length;
  const fmt=ts=>{const d=new Date(ts);return d.getDate()+'.'+(d.getMonth()+1)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
  const gr=[.25,.5,.75].map(r=>({y:(H-r*H*.78-H*.11).toFixed(1),p:(mn+rng*r).toFixed(2)}));
  const gs=gr.map(g=>`<line x1="0" y1="${g.y}" x2="${W}" y2="${g.y}" stroke="rgba(255,255,255,.04)" stroke-width="1" stroke-dasharray="3 3"/><text x="2" y="${(parseFloat(g.y)-3).toFixed(0)}" fill="rgba(255,255,255,.2)" font-size="7">${g.p}</text>`).join('');
  const avgY=(H-((avg-mn)/rng)*H*.78-H*.11).toFixed(1);
  return `<div>
<div style="display:flex;justify-content:space-between;font-size:9px;color:#404060;margin-bottom:4px;padding:0 4px"><span>${fmt(pts[0].time)}</span><span style="color:${col};font-weight:700">${last.price.toFixed(2)} TON ${up?'▲':'▼'}</span><span>${fmt(last.time)}</span></div>
<div style="background:rgba(255,255,255,.02);border-radius:14px;padding:10px 6px 14px">
<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".22"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
${gs}
<path d="${lp} L ${lx} ${H} L 0 ${H} Z" fill="url(#${gid})"/>
<path d="${lp}" stroke="${col}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="0" y1="${avgY}" x2="${W}" y2="${avgY}" stroke="rgba(255,255,255,.14)" stroke-width="1" stroke-dasharray="3 3"/>
<circle cx="${lx}" cy="${ly}" r="6" fill="${col}" opacity=".25"/><circle cx="${lx}" cy="${ly}" r="3.5" fill="${col}"/>
</svg></div>
<div style="display:flex;justify-content:space-between;margin-top:10px;padding:0 2px">
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Мин</div><div style="font-size:13px;font-weight:800;color:#4d9fff">${mn.toFixed(2)}</div></div>
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Среднее</div><div style="font-size:13px;font-weight:800;color:#a0a0c0">${avg.toFixed(2)}</div></div>
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Макс</div><div style="font-size:13px;font-weight:800;color:#f0b429">${mx.toFixed(2)}</div></div>
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Сейчас</div><div style="font-size:13px;font-weight:800;color:${col}">${last.price.toFixed(2)}</div></div>
</div></div>`;
}

function genWheelSectors(stakeSlug){
  const sf=prices[stakeSlug]?.floor||1;
  const all=[...GIFTS].filter(g=>g.slug!==stakeSlug&&(prices[g.slug]?.floor||0)>0).sort((a,b)=>(prices[a.slug]?.floor||0)-(prices[b.slug]?.floor||0));
  const cheaper=all.filter(g=>(prices[g.slug]?.floor||0)<sf).slice(-2);
  const similar=all.filter(g=>{const f=prices[g.slug]?.floor||0;return f>=sf*.7&&f<=sf*1.6;}).slice(0,3);
  const expensive=all.filter(g=>(prices[g.slug]?.floor||0)>sf*1.6).slice(0,7);
  let sel=[...cheaper,...similar,...expensive].slice(0,12);
  while(sel.length<6){const e=all.find(g=>!sel.find(s=>s.slug===g.slug));if(!e)break;sel.push(e);}
  wheelSectorGifts=sel.map((g,i)=>{const pf=prices[g.slug]?.floor||1;const ch=Math.min(Math.max(sf/(sf+pf)*100,3),90);return{gift:g,floor:pf,chance:parseFloat(ch.toFixed(1)),color:WHEEL_COLS[i%WHEEL_COLS.length]};});
  renderWheelUI(stakeSlug);
}

function buildWheelSVG(hiIdx){
  const n=wheelSectorGifts.length;if(!n)return'';
  const cx=100,cy=100,r=94,ir=30;let paths='';
  for(let i=0;i<n;i++){
    const a1=(i/n*360-90)*Math.PI/180,a2=((i+1)/n*360-90)*Math.PI/180;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const ix1=cx+ir*Math.cos(a1),iy1=cy+ir*Math.sin(a1),ix2=cx+ir*Math.cos(a2),iy2=cy+ir*Math.sin(a2);
    const col=wheelSectorGifts[i]?.color||'#7c5cff',isHL=i===hiIdx;
    const midA=((i+.5)/n*360-90)*Math.PI/180,lx=cx+(r*.68)*Math.cos(midA),ly=cy+(r*.68)*Math.sin(midA);
    paths+=`<path d="M ${ix1.toFixed(1)} ${iy1.toFixed(1)} L ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 0 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L ${ix2.toFixed(1)} ${iy2.toFixed(1)} A ${ir} ${ir} 0 0 0 ${ix1.toFixed(1)} ${iy1.toFixed(1)} Z" fill="${isHL?'#fff':col}" opacity="${isHL?1:.88}" stroke="#080810" stroke-width="2"/>`;
    paths+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="${isHL?col:'rgba(255,255,255,.9)'}" pointer-events="none">${(wheelSectorGifts[i]?.chance||0).toFixed(0)}%</text>`;
  }
  return paths+`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"/><circle cx="${cx}" cy="${cy}" r="${ir}" fill="#0a0a18" stroke="rgba(255,255,255,.2)" stroke-width="2"/>`;
}

function doWheelSpin(){
  if(!wheelStakeSlug||wheelSpinning||!wheelSectorGifts.length)return;
  wheelSpinning=true;
  const btn=document.getElementById('spin-btn');if(btn){btn.style.opacity='.4';btn.style.pointerEvents='none';btn.textContent='🌀 Крутится...';}
  const n=wheelSectorGifts.length,total=wheelSectorGifts.reduce((s,sec)=>s+sec.chance,0);
  let rand=Math.random()*total,winIdx=0;
  for(let i=0;i<n;i++){rand-=wheelSectorGifts[i].chance;if(rand<=0){winIdx=i;break;}}
  const winMid=(winIdx+.5)/n*360,target=360*6+(360-winMid);
  const wheel=document.getElementById('upg-wheel');if(wheel)wheel.style.transform=`rotate(${target}deg)`;
  let tick=0;
  const gi=setInterval(()=>{const w=document.getElementById('upg-wheel');if(w)w.innerHTML=buildWheelSVG(tick%n);tick++;},120);
  setTimeout(()=>{
    clearInterval(gi);const w=document.getElementById('upg-wheel');if(w)w.innerHTML=buildWheelSVG(winIdx);
    wheelSpinning=false;setTimeout(()=>showWheelResult(wheelSectorGifts[winIdx],winIdx),900);
  },5300);
}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:#505070;letter-spacing:.5px">👥 СЕЙЧАС В ПРИЛОЖЕНИИ</div><div style="font-size:10px;color:#22d47a;font-weight:700">${onlineCount} чел.</div></div>
<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:4px">
${onlineCount===0?`<div style="color:#404060;font-size:12px;padding:8px 0">Ты первый сегодня! 🎉</div>`:
onlineUsers.slice(0,12).map(usr=>`<div style="flex:0 0 auto;text-align:center">
<div style="width:46px;height:46px;border-radius:50%;overflow:hidden;margin:0 auto 4px;border:2px solid rgba(34,212,122,.35);box-shadow:0 0 10px rgba(34,212,122,.18)">
${usr.avatar?`<img src="${esc(usr.avatar)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.background='linear-gradient(135deg,#7c5cff,#4d9fff)';this.parentElement.innerHTML='<span style=font-size:18px;line-height:46px;color:#fff>'+(usr.name||'?')[0].toUpperCase()+'</span>'"/>`
:`<div style="width:100%;height:100%;background:linear-gradient(135deg,#7c5cff,#4d9fff);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff">${esc((usr.name||'?')[0].toUpperCase())}</div>`}
</div>
<div style="font-size:9px;color:#606080;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((usr.name||'User').split(' ')[0])}</div>
</div>`).join('')}
${onlineCount>12?`<div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#606080">+${onlineCount-12}</div></div>`:''}
</div></div>
<div style="display:flex;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;background:#080810;z-index:5;margin-top:14px">
${[['inv','🎁 Подарки'],['wheel','🎡 Игры'],['settings','⚙️ Инфо']].map(([t,l])=>`<button id="ptb-${t}" onclick="switchPTab('${t}')" style="flex:1;padding:11px 4px;font-size:11px;font-weight:600;border-bottom:${t==='inv'?'2px solid #7c5cff':'2px solid transparent'};color:${t==='inv'?'#a480ff':'#505070'};cursor:pointer;margin-bottom:-1px">${l}</button>`).join('')}
</div>
<div id="ptcontent" style="padding:14px">${pInv(inv)}</div>
</div>`;
}

function switchPTab(t){
  ['inv','wheel','settings'].forEach(x=>{const b=document.getElementById('ptb-'+x);if(b){b.style.borderBottom=t===x?'2px solid #7c5cff':'2px solid transparent';b.style.color=t===x?'#a480ff':'#505070';}});
  const inv=profileGiftList();
  const el=document.getElementById('ptcontent');if(!el)return;
  if(t==='inv')el.innerHTML=pInv(inv);
  else if(t==='wheel')el.innerHTML=`<div style="animation:fadeIn .2s ease"><div style="background:rgba(255,255,255,.03);border-radius:18px;padding:24px;text-align:center;border:1px solid rgba(255,255,255,.06)"><div style="font-size:42px;margin-bottom:12px">🎡</div><div style="font-size:16px;font-weight:700;color:#a480ff;margin-bottom:6px">История игр</div><div style="font-size:12px;color:#505070;margin-bottom:16px">Сыграй в Колесо Апгрейда!</div><button onclick="go('wheel')" style="padding:12px 24px;border-radius:14px;background:linear-gradient(135deg,#7c5cff,#5c3dff);color:#fff;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(124,92,255,.4)">🎡 Открыть</button></div></div>`;
  else el.innerHTML=pSettings();
}

function pInv(inv){
  if (!walletAddress) {
    return `<div style="animation:fadeIn .2s ease;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:26px 18px;text-align:center">
      <div style="font-size:42px;margin-bottom:12px">🎁</div>
      <div style="font-size:16px;font-weight:800;color:#a480ff;margin-bottom:6px">Подключи кошелёк</div>
      <div style="font-size:12px;color:#606080;line-height:1.6;margin-bottom:16px">После подключения мы покажем твои Telegram Gifts/NFT из TON-кошелька. Если подарков нет — список будет пустым.</div>
      <button onclick="connectTonWallet()" style="padding:12px 22px;border-radius:14px;background:linear-gradient(135deg,#4d9fff,#7c5cff);color:#fff;font-size:13px;font-weight:800">🔗 Подключить кошелёк</button>
    </div>`;
  }
  if (walletLoading) {
    return `<div style="text-align:center;padding:28px;color:#606080"><div style="font-size:24px;margin-bottom:8px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div><div style="font-size:13px">Загружаем баланс и подарки...</div></div>`;
  }
  if (!inv.length) {
    return `<div style="animation:fadeIn .2s;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:26px 18px;text-align:center">
      <div style="font-size:42px;margin-bottom:12px">📭</div>
      <div style="font-size:16px;font-weight:800;color:#d0d0f0;margin-bottom:6px">Подарков не найдено</div>
      <div style="font-size:12px;color:#606080;line-height:1.6;margin-bottom:16px">В этом TON-кошельке не найдено Telegram Gifts. Баланс: <b style="color:#f0b429">${fmtTon(walletBalance,4)} TON</b>.</div>
      <button onclick="refreshWalletData()" style="padding:10px 18px;border-radius:12px;background:rgba(77,159,255,.12);border:1px solid rgba(77,159,255,.25);color:#4d9fff;font-size:12px;font-weight:800">↻ Проверить ещё раз</button>
    </div>`;
  }
  return `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;animation:fadeIn .2s ease">
${inv.map((g,i)=>`<div onclick="window.open('${esc(g.url||'#')}','_blank')" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;cursor:pointer;animation:fadeUp .25s ease ${i*.07}s both">
<div style="width:100%;padding-bottom:80%;position:relative;background:rgba(0,0,0,.2)">${g.image?`<img src="${esc(g.image)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;image-rendering:-webkit-optimize-contrast" onerror="this.style.opacity=.2"/>`:`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px">🎁</div>`}</div>
<div style="padding:9px 10px 11px">
<div style="font-size:12px;font-weight:700;color:#d0d0f0;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.name)}</div>
<div style="font-size:10px;color:#7c5cff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.collection)}</div>
<div style="font-size:9px;color:#505070;margin-top:4px;font-family:monospace">${esc(shortAddr(g.address))}</div>
<div style="display:flex;gap:6px;margin-top:8px">
<button onclick="event.stopPropagation();window.open('${esc(g.url||'#')}','_blank')" style="flex:1;padding:6px;border-radius:8px;background:rgba(124,92,255,.12);border:1px solid rgba(124,92,255,.25);color:#a480ff;font-size:9px;font-weight:700">Открыть ↗</button>
<button onclick="event.stopPropagation();openGiftAction('${GIFTS[0]?.slug||'gift'}','withdraw')" style="flex:1;padding:6px;border-radius:8px;background:rgba(77,159,255,.1);border:1px solid rgba(77,159,255,.25);color:#4d9fff;font-size:9px;font-weight:700">Вывод</button>
</div></div></div>`).join('')}
</div>`;
}

function pSettings(){
  const u=TG_USER||{};
  return `<div style="animation:fadeIn .2s ease">
<div style="background:rgba(255,255,255,.03);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)">
<div style="font-size:10px;color:#505070;font-weight:700;margin-bottom:12px;letter-spacing:.5px">АККАУНТ TELEGRAM</div>
<div style="display:flex;align-items:center;gap:12px">${avatarHtml(52)}
<div><div style="font-size:15px;font-weight:800;color:#f0f0ff">${u.name||'—'}</div><div style="font-size:12px;color:#7c5cff">${u.username||'—'}</div><div style="font-size:10px;color:#404060;margin-top:2px">ID: ${u.id||'—'}</div></div></div>
</div>
<div style="background:rgba(255,255,255,.03);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)">
<div style="font-size:10px;color:#505070;font-weight:700;margin-bottom:12px;letter-spacing:.5px">ДАННЫЕ</div>
${[['🔗 Источник цен','Portal Market'],['⏱ Обновление','Каждые 20 сек'],['📊 Коллекций',String(GIFTS.length)],['💱 TON/USD','$'+tonUsd.toFixed(3)]].map(([l,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:12px;color:#606080">${l}</span><span style="font-size:12px;font-weight:700;color:#c0c0e0">${v}</span></div>`).join('')}
</div>
<div style="background:rgba(255,255,255,.03);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)">
<div style="font-size:10px;color:#505070;font-weight:700;margin-bottom:12px;letter-spacing:.5px">КОШЕЛЁК</div>
${[['💎 Адрес',walletAddress?shortAddr(walletAddress):'не подключён'],['💰 Баланс',fmtTon(walletBalance,4)+' TON'],['🎁 Telegram Gifts',String(walletGifts.length)],['🕒 Обновлено',walletLastUpdate?new Date(walletLastUpdate).toLocaleTimeString('ru'):'—']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:12px"><span style="font-size:12px;color:#606080">${l}</span><span style="font-size:12px;font-weight:700;color:#c0c0e0;text-align:right">${esc(v)}</span></div>`).join('')}
</div>
<a href="https://fragment.com/gifts" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#808090;font-size:13px;font-weight:700">🔗 Fragment.com</a>
</div>`;
}

// ═══ INIT ═══
async function init() {
  initTgUser();
  initTonConnect();
  scheduleSplashAutoClick();
  setTimeout(saveProfile, 2500);
  if (walletAddress) setTimeout(()=>loadWalletData(true), 1200);
  const st=document.getElementById('sstat');

  const statuses=['Подключаемся к Portal Market...','Получаем цены...','Загружаем коллекции...'];
  let si=0;
  const stInt=setInterval(()=>{ si++; if(si<statuses.length&&st){st.style.opacity='0';setTimeout(()=>{st.textContent=statuses[si];st.style.transition='opacity .3s';st.style.opacity='1';},200);} },700);

  try {
    const ok=await fetchPrices();
    clearInterval(stInt);

    if(!ok||GIFTS.length===0){
      if(st)st.textContent='Повторная попытка...';
      await new Promise(r=>setTimeout(r,2500));
      await fetchPrices();
    }

    if(st)st.textContent=`✅ ${GIFTS.length} подарков загружено`;
    splashReady=true;

    connectWS();
    setInterval(fetchPrices,20000);
    setInterval(()=>{countdown=Math.max(0,countdown-1);const tEl=document.getElementById('update-timer');if(tEl)tEl.textContent='↻ '+countdown+'с';if(countdown===0)countdown=20;},1000);

  } catch(e) {
    clearInterval(stInt);
    if(st)st.textContent='Ошибка: '+e.message;
    splashReady=true;
    setTimeout(()=>{ if(!splashDone)splashClick(); },2000);
  }
}

init();
</script>
