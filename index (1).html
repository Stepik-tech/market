<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>CursorGift</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080810;color:#f0f0ff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:15px;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
input{font-family:inherit;outline:none;border:none;background:none}
a{text-decoration:none}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(124,92,255,.3)}50%{box-shadow:0 0 44px rgba(124,92,255,.75)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes priceUp{0%{background:transparent}40%{background:rgba(34,212,122,.2)}100%{background:transparent}}
@keyframes priceDown{0%{background:transparent}40%{background:rgba(255,77,106,.2)}100%{background:transparent}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(140px) rotate(720deg);opacity:0}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes wheelSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes wheelResult{0%{transform:rotate(0deg)}100%{transform:rotate(var(--final-angle))}}
@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes giftFloat{0%,100%{transform:translateY(0px) scale(1)}50%{transform:translateY(-14px) scale(1.04)}}
@keyframes giftReveal{0%{opacity:0;transform:scale(.5) translateY(40px)}60%{opacity:1;transform:scale(1.06) translateY(-6px)}100%{transform:scale(1) translateY(0)}}
@keyframes cursorMove{0%{transform:translate(60px,60px) scale(.8);opacity:0}30%{opacity:1;transform:translate(60px,60px) scale(1)}70%{transform:translate(0px,0px) scale(1)}85%{transform:translate(0px,0px) scale(.85)}100%{transform:translate(0px,0px) scale(1);opacity:0}}
@keyframes cursorClick{0%,100%{transform:scale(1)}50%{transform:scale(.78)}}
@keyframes splashOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.08)}}
@keyframes upgradeSlot{0%{transform:translateY(-200%)}100%{transform:translateY(0)}}
@keyframes onlinePulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

.app{display:flex;flex-direction:column;min-height:100dvh;max-width:430px;margin:0 auto}
.page{overflow-y:auto;padding-bottom:76px;min-height:100dvh}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(5,5,12,.97);backdrop-filter:blur(28px);border-top:1px solid rgba(255,255,255,.06);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:transform .12s}
.nb:active{transform:scale(.9)}
.npip{position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:2px;border-radius:2px;background:linear-gradient(90deg,#7c5cff,#a480ff);box-shadow:0 0 10px #7c5cff}
.nico{font-size:22px;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.nico.on{transform:scale(1.2) translateY(-1px);filter:drop-shadow(0 0 8px rgba(124,92,255,.8))}
.nlbl{font-size:10px;font-weight:600;letter-spacing:.2px}
.gcard{border-radius:20px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;display:flex;flex-direction:column;background:linear-gradient(160deg,rgba(22,18,40,.98),rgba(12,12,22,.99));border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.gcard:active{transform:scale(.95)}
.shim{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}
.spill{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;transition:all .18s;cursor:pointer;white-space:nowrap}
.spill.on{background:rgba(77,159,255,.15);border:1px solid rgba(77,159,255,.35);color:#4d9fff}
.spill.off{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:#404060}
.back{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#f0f0ff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);margin:0 16px}
.tab{flex:1;padding:11px 0;font-size:12px;font-weight:600;background:none;margin-bottom:-1px;cursor:pointer;transition:all .2s}

/* WHEEL */
.wheel-container{position:relative;width:260px;height:260px;margin:0 auto}
.wheel-svg{width:100%;height:100%;transition:transform 4s cubic-bezier(.17,.67,.12,.99)}
.wheel-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:28px;height:28px;z-index:10;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8))}
.wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a0835,#0a0a18);border:3px solid rgba(124,92,255,.6);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(124,92,255,.5);z-index:5}

/* SPLASH */
.splash{position:fixed;inset:0;z-index:999;background:radial-gradient(ellipse at 40% 30%,#16083a 0%,#080810 65%);display:flex;flex-direction:column;align-items:center;justify-content:center}
.sring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(124,92,255,.2)}
.ld{width:150px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:32px}
.ldf{height:100%;background:linear-gradient(90deg,#7c5cff,#a480ff,#4d9fff);animation:lda 2s ease forwards}
@keyframes lda{from{width:0}to{width:100%}}

/* ONLINE BADGE */
.online-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(34,212,122,.1);border:1px solid rgba(34,212,122,.25);border-radius:20px;padding:4px 10px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#22d47a;animation:onlinePulse 2s infinite}

/* AVATAR */
.avatar{border-radius:50%;object-fit:cover;border:2px solid rgba(124,92,255,.5)}
.avatar-placeholder{border-radius:50%;background:linear-gradient(135deg,#7c5cff,#4d9fff);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;border:2px solid rgba(124,92,255,.5)}

/* GIFT ACTION MODAL */
.modal-overlay{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.85);backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;animation:fadeIn .2s ease}
.modal-sheet{background:linear-gradient(180deg,#12101e,#0a0a15);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:20px 20px 36px;border-top:1px solid rgba(255,255,255,.08)}

.conf{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:999;animation:confetti 1.2s ease-out forwards}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:500;background:linear-gradient(135deg,rgba(124,92,255,.97),rgba(77,159,255,.97));border-radius:14px;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(124,92,255,.5);animation:fadeIn .3s ease;backdrop-filter:blur(10px);white-space:nowrap}
</style>
</head>
<body>
<div class="app">

<!-- SPLASH -->
<div class="splash" id="splash" style="background:radial-gradient(ellipse at 40% 35%,#1a083d 0%,#080810 65%);cursor:none">
  <div id="splash-scene" style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0">

    <!-- GIFT BOX — плавно появляется -->
    <div id="splash-gift" style="position:relative;opacity:0;animation:giftReveal .9s cubic-bezier(.34,1.56,.64,1) .4s forwards;cursor:pointer" onclick="splashClick()">
      <!-- glow ring -->
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(124,92,255,.35) 0%,transparent 70%);animation:pulse 2s ease-in-out infinite;pointer-events:none"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(77,159,255,.12) 0%,transparent 70%);animation:pulse 2.5s .5s ease-in-out infinite;pointer-events:none"></div>

      <!-- Logo/Gift -->
      <div id="splash-logo-wrap" style="animation:giftFloat 3s 1.3s ease-in-out infinite;position:relative;z-index:2">
        <img src="https://i.imgur.com/2b2hhDc.png"
          id="splash-logo-img"
          style="width:110px;height:110px;border-radius:28px;object-fit:cover;box-shadow:0 0 60px rgba(124,92,255,.75),0 20px 60px rgba(0,0,0,.6);display:block;transition:transform .15s,box-shadow .15s"
          onerror="this.style.display='none';document.getElementById('splash-logo-fb').style.display='flex'"/>
        <div id="splash-logo-fb" style="display:none;width:110px;height:110px;border-radius:28px;background:linear-gradient(135deg,#7c5cff,#4d9fff);align-items:center;justify-content:center;font-size:52px;box-shadow:0 0 60px rgba(124,92,255,.75)">🎁</div>
      </div>

      <!-- Tap hint -->
      <div id="splash-tap" style="position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:12px;color:rgba(160,160,200,.6);letter-spacing:.5px;opacity:0;animation:fadeIn .5s 1.8s forwards">нажми чтобы открыть</div>
    </div>

    <!-- CURSOR SVG — движется к подарку и кликает -->
    <svg id="splash-cursor" viewBox="0 0 24 24" style="position:absolute;width:36px;height:36px;opacity:0;animation:cursorMove 2.2s 1.4s cubic-bezier(.4,0,.2,1) forwards;pointer-events:none;z-index:20;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8))">
      <path d="M5.5 3.5l13 7.5-6 1.5-4 5.5V3.5z" fill="white" stroke="#7c5cff" stroke-width="1.5"/>
      <circle id="cursor-dot" cx="5.5" cy="3.5" r="2" fill="#7c5cff" opacity="0"/>
    </svg>

  </div>

  <!-- Title — появляется позже -->
  <div id="splash-title" style="margin-top:32px;text-align:center;opacity:0;animation:fadeIn .6s 1s forwards">
    <div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#b090ff,#4d9fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.8px;margin-bottom:4px">CursorGift</div>
    <div style="font-size:11px;color:#5060a0;letter-spacing:.4px">Telegram Gifts · Live · TON</div>
    <div id="splash-user" style="font-size:12px;color:#7060a0;margin-top:6px"></div>
  </div>

  <div id="sstat" style="font-size:11px;color:#4050a0;margin-top:18px;opacity:0;animation:fadeIn .4s 1.2s forwards">Загрузка...</div>
</div>

<!-- APP -->
<div id="main" style="display:none;flex:1;flex-direction:column">
  <div class="page" id="pg-market"></div>
  <div class="page" id="pg-news" style="display:none"></div>
  <div class="page" id="pg-prof" style="display:none"></div>
  <div class="page" id="pg-detail" style="display:none"></div>
  <div class="page" id="pg-wheel" style="display:none"></div>

  <nav class="nav">
    <button class="nb" onclick="go('market')">
      <div class="npip" id="pip-market"></div>
      <span class="nico on" id="ico-market">🏪</span>
      <span class="nlbl" style="color:#a480ff" id="lbl-market">Рынок</span>
    </button>
    <button class="nb" onclick="go('news')">
      <div class="npip" id="pip-news" style="display:none"></div>
      <span class="nico" id="ico-news">📰</span>
      <span class="nlbl" style="color:#404060" id="lbl-news">Новости</span>
    </button>
    <button class="nb" onclick="go('wheel')">
      <div class="npip" id="pip-wheel" style="display:none"></div>
      <span class="nico" id="ico-wheel">🎡</span>
      <span class="nlbl" style="color:#404060" id="lbl-wheel">Колесо</span>
    </button>
    <button class="nb" onclick="go('prof')">
      <div class="npip" id="pip-prof" style="display:none"></div>
      <span class="nico" id="ico-prof">👤</span>
      <span class="nlbl" style="color:#404060" id="lbl-prof">Профиль</span>
    </button>
  </nav>
</div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const PROXY_HTTP = 'https://web-production-ad0c.up.railway.app';
const PROXY_WS   = 'wss://web-production-ad0c.up.railway.app';

// ═══════════════════════════════════════════
// TELEGRAM USER (реальный аккаунт)
// ═══════════════════════════════════════════
const tg = window.Telegram?.WebApp;
let TG_USER = null;

function initTgUser() {
  if (tg) {
    tg.ready();
    tg.expand();
    const u = tg.initDataUnsafe?.user;
    if (u) {
      TG_USER = {
        id: u.id,
        name: [u.first_name, u.last_name].filter(Boolean).join(' '),
        username: u.username ? '@' + u.username : '',
        photo: u.photo_url || null,
        isPremium: u.is_premium || false,
        initials: ((u.first_name||'?')[0] + (u.last_name||'')[0]).toUpperCase().slice(0,2)
      };
    }
  }
  if (!TG_USER) {
    TG_USER = { id: 0, name: 'Гость', username: '', photo: null, isPremium: false, initials: '👤' };
  }
  const el = document.getElementById('splash-user');
  if (el && TG_USER.id) el.textContent = 'Привет, ' + TG_USER.name + '!';
}

// Анимация курсора → клик → загрузка
let splashReady = false;
let splashDone = false;

function splashClick() {
  if (splashDone) return;
  splashDone = true;
  // Эффект нажатия на иконку
  const logo = document.getElementById('splash-logo-wrap');
  const tapHint = document.getElementById('splash-tap');
  if (logo) { logo.style.transform = 'scale(.88)'; logo.style.transition = 'transform .1s'; setTimeout(()=>{ logo.style.transform='scale(1)'; }, 100); }
  if (tapHint) tapHint.style.display = 'none';
  // Вспышка
  const splash = document.getElementById('splash');
  if (splash) {
    splash.style.transition = 'opacity .4s ease, transform .4s ease';
    setTimeout(() => {
      splash.style.opacity = '0';
      splash.style.transform = 'scale(1.06)';
      setTimeout(() => {
        splash.style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        go('market');
      }, 380);
    }, 120);
  }
}

// Авто-клик курсором через 3.2 сек если пользователь сам не нажал
function scheduleSplashAutoClick() {
  setTimeout(() => {
    if (!splashDone && splashReady) {
      splashClick();
    } else if (!splashDone) {
      // Данные ещё грузятся — ждём
      setTimeout(() => { if(!splashDone) splashClick(); }, 2000);
    }
  }, 3200);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let GIFTS = [];
let prices = {};
let histories = {};
let tonUsd = 2.05;
let onlineCount = 0;
let onlineUsers = [];
let curTab = 'market';
let detailSlug = null;
let wheelTarget = null;
let wheelStake = null;
let mSort = 'vol24h';
let mQuery = '';
let detailPeriod = 24;
let lotties = {};
let countdown = 20;
let ws = null;

const thumb = s => `https://fragment.com/file/gifts/${s}/thumb.webp`;
const lottieUrl = (s,n) => `https://nft.fragment.com/gift/${s}-${n}.lottie.json`;
const nftImg = (s,n) => `https://nft.fragment.com/gift/${s}-${n}.large.jpg`;

// ═══════════════════════════════════════════
// WEBSOCKET — онлайн счётчик
// ═══════════════════════════════════════════
function connectWS() {
  try {
    ws = new WebSocket(PROXY_WS);
    ws.onopen = () => {
      if (TG_USER?.id) {
        ws.send(JSON.stringify({ type: 'ping', userId: TG_USER.id, name: TG_USER.name, avatar: TG_USER.photo }));
        // Пингуем каждые 25 сек
        setInterval(() => {
          if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'ping', userId: TG_USER.id, name: TG_USER.name, avatar: TG_USER.photo }));
        }, 25000);
      }
    };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'online') {
          onlineCount = msg.count;
          onlineUsers = msg.users || [];
          updateOnlineBadge();
        }
      } catch(e) {}
    };
    ws.onclose = () => setTimeout(connectWS, 5000);
    ws.onerror = () => ws.close();
  } catch(e) {}
}

function updateOnlineBadge() {
  document.querySelectorAll('.online-count').forEach(el => {
    el.textContent = onlineCount;
  });
}

// ═══════════════════════════════════════════
// FETCH PRICES
// ═══════════════════════════════════════════
async function fetchPrices() {
  try {
    const r = await fetch(PROXY_HTTP + '/api/prices', { cache: 'no-store' });
    const j = await r.json();
    tonUsd = j.ton_usd || tonUsd;
    const oldSlugs = new Set(GIFTS.map(g => g.slug));
    const wasCount = GIFTS.length;
    (j.collections || []).forEach(c => {
      const prev = prices[c.slug]?.floor;
      prices[c.slug] = { floor: c.floor, change24h: c.change24h, vol24h: c.vol24h, listed: c.listed, supply: c.supply, sales24h: c.sales24h, marketCap: c.marketCap, prevFloor: prev || c.floor, updated: Date.now() };
      if (!histories[c.slug]) histories[c.slug] = [];
      histories[c.slug].push({ time: Date.now(), price: c.floor });
      if (histories[c.slug].length > 8640) histories[c.slug].shift();
    });
    GIFTS = (j.collections || []).map(c => ({ slug: c.slug, name: c.name, photo: c.portalPhoto || thumb(c.slug), tg_id: 1, isNew: !oldSlugs.has(c.slug) && wasCount > 0 }));
    GIFTS.filter(g => g.isNew).forEach(g => showToast('🆕 ' + g.name, 'Новый подарок!'));
    updatePriceDom();
    countdown = 20;
    return true;
  } catch(e) { console.warn('[prices]', e.message); return false; }
}

async function fetchHistory(slug) {
  try {
    const r = await fetch(`${PROXY_HTTP}/api/history/${slug}?hours=99999`);
    const j = await r.json();
    if (j.history?.length > 1) {
      const merged = [...j.history, ...(histories[slug]||[])].sort((a,b)=>a.time-b.time).filter((p,i,arr)=>i===0||p.time!==arr[i-1].time);
      histories[slug] = merged;
    }
  } catch(e) {}
}

function updatePriceDom() {
  GIFTS.forEach(g => {
    const p = prices[g.slug]; if (!p) return;
    const up = p.change24h >= 0;
    const pEl = document.getElementById('pv-'+g.slug);
    if (pEl) {
      const prev = parseFloat(pEl.dataset.prev||0);
      pEl.textContent = p.floor.toFixed(2);
      pEl.dataset.prev = p.floor;
      if (prev>0 && prev!==p.floor) {
        const box = pEl.closest('.price-box');
        if (box) { box.style.animation='none'; void box.offsetWidth; box.style.animation=p.floor>prev?'priceUp .9s ease':'priceDown .9s ease'; }
        pEl.style.color = p.floor>prev?'#22d47a':'#ff4d6a';
        setTimeout(()=>{ if(pEl)pEl.style.color=''; }, 900);
      }
    }
    const cEl = document.getElementById('pc-'+g.slug);
    if (cEl) { cEl.textContent=(up?'▲':'▼')+' '+Math.abs(p.change24h)+'%'; cEl.style.color=up?'#22d47a':'#ff4d6a'; }
    const mcEl = document.getElementById('mc-'+g.slug);
    if (mcEl) mcEl.innerHTML = miniChart(g.slug);
    const dpEl = document.getElementById('dp-'+g.slug);
    if (dpEl) dpEl.textContent = p.floor.toFixed(2);
  });
  const tEl = document.getElementById('update-timer');
  if (tEl) tEl.textContent = '↻ '+countdown+'с';
}

// ═══════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════
function miniChart(slug, w=84, h=28) {
  const pts = (histories[slug]||[]).slice(-30).map(p=>p.price);
  if (pts.length<2) return `<div class="shim" style="width:${w}px;height:${h}px;border-radius:6px"></div>`;
  const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||0.01,st=w/(pts.length-1);
  const up=pts[pts.length-1]>=pts[0],col=up?'#22d47a':'#ff4d6a';
  const lp=pts.map((p,i)=>`${i?'L':'M'} ${(i*st).toFixed(1)} ${(h-((p-mn)/rng)*h*.86-h*.07).toFixed(1)}`).join(' ');
  const lx=(pts.length-1)*st, gid='mc'+slug.replace(/[^a-z0-9]/g,'');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">

function bigChart(slug, period) {
  const cutoff=period>=99999?0:Date.now()-period*3600000;
  let pts=(histories[slug]||[]).filter(p=>p.time>=cutoff);
  if(pts.length<3)pts=(histories[slug]||[]).slice(-100);
  if(pts.length<2)return`<div style="height:140px;display:flex;align-items:center;justify-content:center;color:#303050;font-size:13px">⏳ Загружаем данные...</div>`;
  const W=310,H=130,st=W/(pts.length-1);
  const pa=pts.map(p=>p.price),mn=Math.min(...pa),mx=Math.max(...pa),rng=mx-mn||0.01;
  const lp=pts.map((p,i)=>`${i?'L':'M'} ${(i*st).toFixed(1)} ${(H-((p.price-mn)/rng)*H*.82-H*.09).toFixed(1)}`).join(' ');
  const last=pts[pts.length-1],lx=(pts.length-1)*st,ly=H-((last.price-mn)/rng)*H*.82-H*.09;
  const up=last.price>=pts[0].price,col=up?'#22d47a':'#ff4d6a';
  const gid='bc'+slug.replace(/[^a-z0-9]/g,''),avg=(pa.reduce((a,b)=>a+b,0)/pa.length).toFixed(2);
  const fmt=ts=>{const d=new Date(ts);return`${d.getDate()}.${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;};
  return `<div>
<div style="display:flex;justify-content:space-between;font-size:9px;color:#303055;margin-bottom:5px"><span>${fmt(pts[0].time)}</span><span>${fmt(last.time)}</span></div>
<div style="background:rgba(255,255,255,.02);border-radius:14px;padding:10px 6px 16px">
<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".22"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
${[.25,.5,.75].map(r=>`<line x1="0" y1="${H*r}" x2="${W}" y2="${H*r}" stroke="rgba(255,255,255,.032)" stroke-width="1"/>`).join('')}
<path d="${lp} L ${lx} ${H} L 0 ${H} Z" fill="url(#${gid})"/>
<path d="${lp}" stroke="${col}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="${lx}" cy="${ly}" r="5" fill="${col}" opacity=".25"/><circle cx="${lx}" cy="${ly}" r="3" fill="${col}"/>
<text x="${lx>250?lx-6:lx+6}" y="${ly-9}" text-anchor="${lx>250?'end':'middle'}" fill="${col}" font-size="10" font-weight="700">${last.price.toFixed(2)}</text>
</svg></div>
<div style="display:flex;justify-content:space-around;margin-top:10px">
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Мин</div><div style="font-size:12px;font-weight:800;color:#4d9fff">${mn.toFixed(2)}</div></div>
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Среднее</div><div style="font-size:12px;font-weight:800;color:#a0a0c0">${avg}</div></div>
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Макс</div><div style="font-size:12px;font-weight:800;color:#f0b429">${mx.toFixed(2)}</div></div>
<div style="text-align:center"><div style="font-size:9px;color:#404060;margin-bottom:2px">Точек</div><div style="font-size:12px;font-weight:800;color:#505070">${pts.length}</div></div>
</div></div>`;
}

function selectUpgradeStake(slug) {
  wheelStakeSlug = slug;
  const stakeFloor = prices[slug]?.floor || 1;

  // Подсветка выбранного
  document.querySelectorAll('[id^="sk-"]').forEach(e=>{
    e.style.background='rgba(255,255,255,.04)';e.style.border='1px solid rgba(255,255,255,.07)';e.style.transform='scale(1)';
  });

  if(el){el.style.background='rgba(124,92,255,.2)';el.style.border='1px solid rgba(124,92,255,.6)';el.style.transform='scale(1.06)';}

  // Генерируем сектора колеса на основе цены ставки
  generateWheelSectors(slug, stakeFloor);
}

function generateWheelSectors(stakeSlug, stakeFloor) {
  // Берём подарки с разными ценами — от чуть дороже до 10x дороже
  // Соотношение floor ставки к floor приза определяет шанс
  const allGifts = [...GIFTS].filter(g => g.slug !== stakeSlug && (prices[g.slug]?.floor||0) > 0);
  allGifts.sort((a,b) => (prices[a.slug]?.floor||0) - (prices[b.slug]?.floor||0));

  // Выбираем 12 подарков с разбросом цен:
  // - 2-3 дешевле ставки (гарантированный выигрыш >50%)
  // - 3-4 похожей цены (50% шанс)
  // - 5-6 дороже (меньший шанс, больший выигрыш)
  const cheaper = allGifts.filter(g => (prices[g.slug]?.floor||0) < stakeFloor).slice(-3);
  const similar = allGifts.filter(g => { const f=prices[g.slug]?.floor||0; return f >= stakeFloor*0.8 && f <= stakeFloor*1.5; }).slice(0,3);
  const expensive = allGifts.filter(g => (prices[g.slug]?.floor||0) > stakeFloor*1.5).slice(0,6);

  let selected = [...cheaper, ...similar, ...expensive].slice(0, WHEEL_SECTORS);
  // Добираем если мало
  while (selected.length < WHEEL_SECTORS) {
    const extra = allGifts.find(g => !selected.find(s=>s.slug===g.slug));
    if(!extra) break;
    selected.push(extra);
  }

  // Считаем шансы: chance = stakeFloor / (stakeFloor + prizeFloor) * 100
  // Чем дороже приз, тем ниже шанс
  wheelSectorGifts = selected.map((g, i) => {
    const prizeFloor = prices[g.slug]?.floor || 1;
    const chance = (stakeFloor / (stakeFloor + prizeFloor) * 100);
    return {
      gift: g,
      floor: prizeFloor,
      chance: Math.min(Math.max(chance, 3), 90), // 3% — 90%
      color: WHEEL_COLORS[i % WHEEL_COLORS.length],
      isWin: null // будет установлено при вращении
    };
  });

  // Рендерим колесо
  renderUpgradeWheel();
}

        </div>`).join('')}

  // Активируем кнопку
  const btn = document.getElementById('spin-btn');
  if(btn){

}

function buildUpgradeWheelSVG(highlightIdx) {
  const n = wheelSectorGifts.length;
  if(n===0) return '';
  const cx=100,cy=100,r=94,ir=30;
  let paths='';

  for(let i=0;i<n;i++){
    const startA=(i/n*360-90)*Math.PI/180;
    const endA=((i+1)/n*360-90)*Math.PI/180;
    const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
    const x2=cx+r*Math.cos(endA),y2=cy+r*Math.sin(endA);
    const ix1=cx+ir*Math.cos(startA),iy1=cy+ir*Math.sin(startA);
    const ix2=cx+ir*Math.cos(endA),iy2=cy+ir*Math.sin(endA);
    const col=wheelSectorGifts[i]?.color||WHEEL_COLORS[i%WHEEL_COLORS.length];
    const isHL=i===highlightIdx;
    const midA=((i+.5)/n*360-90)*Math.PI/180;
    const lx=cx+(r*.68)*Math.cos(midA),ly=cy+(r*.68)*Math.sin(midA);
    const chance=wheelSectorGifts[i]?.chance||0;

    paths+=`<path d="M ${ix1} ${iy1} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 0 0 ${ix1} ${iy1} Z"
      fill="${isHL?'#fff':col}" opacity="${isHL?1:.88}" stroke="#080810" stroke-width="2"/>`;
    // Процент шанса
    paths+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="${isHL?col:'rgba(255,255,255,.9)'}" style="pointer-events:none">${chance.toFixed(0)}%</text>`;
  }

  paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"/>`;
  paths+=`<circle cx="${cx}" cy="${cy}" r="${ir}" fill="#0a0a18" stroke="rgba(255,255,255,.2)" stroke-width="2"/>`;

  return paths;
}

// === ВРАЩЕНИЕ ===
let wheelSpinning = false;

function doUpgradeSpin() {
  if(!wheelStakeSlug || wheelSpinning || wheelSectorGifts.length===0) return;
  wheelSpinning = true;

  const btn=document.getElementById('spin-btn');
  if(btn){btn.style.opacity='.4';btn.style.pointerEvents='none';btn.textContent='🌀 Крутится...';}

  const stakeFloor = prices[wheelStakeSlug]?.floor || 1;
  const n = wheelSectorGifts.length;

  // Определяем результат на основе шансов
  // Каждый сектор имеет свой % — делаем взвешенный рандом
  const totalWeight = wheelSectorGifts.reduce((s,sec)=>s+sec.chance,0);
  let rand = Math.random()*totalWeight;
  let winIdx = 0;
  for(let i=0;i<n;i++){
    rand-=wheelSectorGifts[i].chance;
    if(rand<=0){winIdx=i;break;}
  }

  const winSector = wheelSectorGifts[winIdx];
  const sectorAngle = 360/n;
  // Целевой угол: указатель сверху (0°) должен оказаться на winIdx секторе
  // Угол сектора i начинается с i/n*360 - 90
  // Нам нужно повернуть так чтобы середина winIdx сектора была наверху
  const winMidAngle = (winIdx+.5)/n*360; // от 0
  const targetAngle = 360*6 + (360-winMidAngle); // 6 оборотов + нужный угол

  const wheel=document.getElementById('upg-wheel');
  if(wheel){
    wheel.style.transform=`rotate(${targetAngle}deg)`;
  }

  // Подсвечиваем сектора во время вращения
  let glowTick=0;
  const glowInt=setInterval(()=>{
    const w=document.getElementById('upg-wheel');
    if(w){w.innerHTML=buildUpgradeWheelSVG(glowTick%n);glowTick++;}
  },100);

  setTimeout(()=>{
    clearInterval(glowInt);
    // Финальная подсветка победного сектора
    const w=document.getElementById('upg-wheel');
    if(w)w.innerHTML=buildUpgradeWheelSVG(winIdx);
    wheelSpinning=false;
    setTimeout(()=>showUpgradeResult(winSector,winIdx),900);
  },5200);
}

      ${onlineCount>10?`<div style="flex:0 0 auto;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#606080">+${onlineCount-10}</div></div>`:''}
      ${onlineCount===0?`<div style="color:#404060;font-size:12px;padding:10px 0">Ты первый! 🎉</div>`:''}
    </div>
  </div>

  <!-- TABS -->
  <div style="display:flex;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;background:#080810;z-index:5;margin-top:14px">
    ${[['inv','🎁 Инвентарь'],['stats','📊 Статистика']].map(([t,l])=>`<button id="ptb-${t}" onclick="switchPTab('${t}')" style="flex:1;padding:11px 4px;font-size:11px;font-weight:600;border-bottom:${t==='inv'?'2px solid #7c5cff':'2px solid transparent'};color:${t==='inv'?'#a480ff':'#505070'};cursor:pointer;margin-bottom:-1px">${l}</button>`).join('')}
  </div>
  <div id="ptcontent" style="padding:14px">${pInv(inv)}</div>
</div>`;
}

function switchPTab(t){
  ['inv','stats'].forEach(x=>{const b=document.getElementById('ptb-'+x);if(b){b.style.borderBottom=t===x?'2px solid #7c5cff':'2px solid transparent';b.style.color=t===x?'#a480ff':'#505070';}});
  const inv=[...GIFTS].sort((a,b)=>(prices[b.slug]?.floor||0)-(prices[a.slug]?.floor||0)).slice(0,5);
  const el=document.getElementById('ptcontent');if(!el)return;
  el.innerHTML=t==='inv'?pInv(inv):pStats();
}

function pInv(inv){
  return `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;animation:fadeIn .2s ease">
${inv.map((g,i)=>`<div onclick="openDetail('${g.slug}')" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;cursor:pointer;animation:fadeUp .25s ease ${i*.07}s both">
<div style="width:100%;padding-bottom:80%;position:relative;background:rgba(0,0,0,.2)"><img src="${thumb(g.slug)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain" onerror="this.style.opacity=.2"/></div>
<div style="padding:9px 10px 11px">
<div style="font-size:12px;font-weight:700;color:#d0d0f0;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.name}</div>
<div style="font-size:13px;color:#f0b429;font-weight:800">${(prices[g.slug]?.floor||0).toFixed(2)} TON</div>
<div style="font-size:9px;color:#505070;margin-top:1px">≈ $${((prices[g.slug]?.floor||0)*tonUsd).toFixed(0)}</div>
<div style="display:flex;gap:6px;margin-top:8px">
<button onclick="event.stopPropagation();openGiftAction('${g.slug}','sell')" style="flex:1;padding:5px;border-radius:8px;background:rgba(34,212,122,.12);border:1px solid rgba(34,212,122,.25);color:#22d47a;font-size:9px;font-weight:700">💰 Продать</button>
<button onclick="event.stopPropagation();openGiftAction('${g.slug}','withdraw')" style="flex:1;padding:5px;border-radius:8px;background:rgba(77,159,255,.1);border:1px solid rgba(77,159,255,.25);color:#4d9fff;font-size:9px;font-weight:700">📤 Вывод</button>
</div>
</div></div>`).join('')}
</div>`;
}

function pStats(){
  return `<div style="animation:fadeIn .2s ease">
<div style="background:rgba(255,255,255,.03);border-radius:18px;padding:20px;margin-bottom:14px;text-align:center;border:1px solid rgba(255,255,255,.06)">
<div style="font-size:36px;margin-bottom:8px">🎡</div>
<div style="font-size:18px;font-weight:700;color:#a480ff">Статистика в разработке</div>
<div style="font-size:12px;color:#505070;margin-top:6px">Сыграй в Колесо Фортуны чтобы появилась история!</div>
<button onclick="go('wheel')" style="margin-top:14px;padding:10px 20px;border-radius:12px;background:linear-gradient(135deg,#7c5cff,#5c3dff);color:#fff;font-size:13px;font-weight:700;box-shadow:0 4px 14px rgba(124,92,255,.4)">🎡 Попробовать</button>
</div></div>`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  initTgUser();
  scheduleSplashAutoClick();
  const st=document.getElementById('sstat');

  try {
    if(st)st.textContent='Загружаем подарки...';
    const ok=await fetchPrices();

    if(!ok||GIFTS.length===0){
      if(st)st.textContent='Повторная попытка...';
      await new Promise(r=>setTimeout(r,2500));
      await fetchPrices();
    }

    if(st)st.textContent=`✅ ${GIFTS.length} подарков загружено`;

    // Подключаем WebSocket для онлайн
    connectWS();

    // Данные загружены — разрешаем авто-клик
    splashReady = true;

    // Обновление цен каждые 20 сек
    setInterval(fetchPrices, 20000);
    setInterval(()=>{
      countdown=Math.max(0,countdown-1);
      const tEl=document.getElementById('update-timer');
      if(tEl)tEl.textContent='↻ '+countdown+'с';
      if(countdown===0)countdown=20;
    },1000);

  } catch(e) {
    if(st)st.textContent='Ошибка: '+e.message;
    splashReady = true;
    setTimeout(()=>splashClick(), 2000);
  }
}

init();
